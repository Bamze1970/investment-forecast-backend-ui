<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Investment Forecast</title>
  manifest.webmanifest
  icon.svg
  styles.css?v=7

  <style>
    /* =========================================
       LANDSCAPE OVERRIDES: phone in horizontal mode
       Цел: в landscape телефонът да показва по-широк,
       desktop-подобен layout, без да пипаме app.js.
       ========================================= */
    @media screen and (orientation: landscape) and (max-width: 1100px) {
      html, body {
        overflow-x: hidden;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
      }

      .header-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 12px;
        flex-shrink: 0;
      }

      .container {
        max-width: 1280px;
      }

      /* Ако cards/редовете имат такива класове в existing CSS/JS */
      .card,
      .asset-card,
      .fund-card,
      .holding-card,
      .holding-row,
      .asset-row,
      .position-card,
      .product-card {
        width: 100%;
      }

      /* По-широко съдържание в landscape */
      #dashboardView,
      #contentView {
        width: 100%;
      }

      /* Bottom nav да не изяжда излишно място */
      .bottom-nav {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .bottom-nav .nav-btn {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Investment Forecast</h1>
      <p class="sub">Backend-connected UI с editable количества, units и price arrows</p>
    </div>
    <div class="header-actions">
      <button id="reloadBtn" class="secondary-btn">Опресни</button>
      <button id="toggleMoneyBtn" class="secondary-btn">Скрий суми</button>
      <button id="settingsBtn" class="secondary-btn">Настройки</button>
    </div>
  </header>

  <div id="statusBar" class="status-bar">Зареждане…</div>

  <main class="container">
    <section id="dashboardView"></section>
    <section id="contentView" class="hidden"></section>
  </main>

  <div id="settingsModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <h2>Настройки</h2>
      <p class="note">Задай backend URL и Portfolio ID.</p>
      <label for="backendUrlInput">Backend URL</label>
      <input id="backendUrlInput" type="text" placeholder="например https://your-backend.example.com" />
      <label for="portfolioIdInput">Portfolio ID</label>
      <input id="portfolioIdInput" type="text" placeholder="например portfolio-boris-main" />
      <div class="modal-actions">
        <button id="saveSettingsBtn" class="primary">Запази</button>
        <button id="closeSettingsBtn" class="secondary-btn">Затвори</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button id="navDashboard" class="nav-btn active">Dashboard</button>
    <button id="navHoldings" class="nav-btn">Активи</button>
    <button id="navHorizons" class="nav-btn">Хоризонти</button>
  </nav>

  <script type="module" src="app.js?v=7"></script>
</body>
</html>
